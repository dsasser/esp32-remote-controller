<text x="146" y="477" font-size="13.5" font-weight="600" fill="#1a1a1a">Banana binding posts</text>
<text x="78" y="500" font-size="11.5" fill="#555">Four red/black pairs up front.</text>
<text x="78" y="516" font-size="11.5" fill="#555">Alligator leads clip on to fire 1-4.</text>
