<text x="90" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C">U2</text>
<text x="110" y="85" font-size="13.5" font-weight="600" fill="#1a1a1a">ESP32-S3 Super Mini</text>
<text x="78" y="108" font-size="11.5" fill="#555">BLE 5.0 brain. GPIO4-7 fire the</text>
<text x="78" y="124" font-size="11.5" fill="#555">channels; GPIO2 drives status LED.</text>
<rect x="342" y="58" width="318" height="84" rx="9" fill="#ffffff" stroke="#e2e0d8" stroke-width="1"/>
<rect x="342" y="72" width="4" height="56" rx="2" fill="#534ab7"/>
<g><rect x="358" y="90" width="36" height="22" rx="2" fill="#3C3489"/><g fill="#1a1640"><rect x="361" y="94" width="7" height="14" rx="1"/><rect x="369" y="94" width="7" height="14" rx="1"/><rect x="377" y="94" width="7" height="14" rx="1"/><rect x="385" y="94" width="7" height="14" rx="1"/></g></g>
<rect x="408" y="72" width="24" height="17" rx="8" fill="#EEEDFE"/>
<text x="420" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C">K1</text>
<text x="440" y="85" font-size="13.5" font-weight="600" fill="#1a1a1a">VNFOCKQSH 4-ch relay</text>
<text x="408" y="108" font-size="11.5" fill="#555">5V opto-isolated, off-board. COM is</text>
<text x="408" y="124" font-size="11.5" fill="#555">fused 7.4V, NO goes to the posts.</text>
<rect x="12" y="156" width="318" height="84" rx="9" fill="#ffffff" stroke="#e2e0d8" stroke-width="1"/>
<rect x="12" y="170" width="4" height="56" rx="2" fill="#BA7517"/>
<g fill="#854F0B"><rect x="28" y="190" width="16" height="16" rx="3"/><rect x="43" y="195" width="3" height="6"/><rect x="48" y="190" width="16" height="16" rx="3"/><rect x="63" y="195" width="3" height="6"/></g>
<rect x="78" y="170" width="24" height="17" rx="8" fill="#FAEEDA"/>
<text x="90" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">B1</text>
<text x="110" y="183" font-size="13.5" font-weight="600" fill="#1a1a1a">2S pack — 2x Samsung 30Q</text>
<text x="78" y="206" font-size="11.5" fill="#555">Two 18650 in series, 7.4V ~3000mAh.</text>
<text x="78" y="222" font-size="11.5" fill="#555">Fires igniters and feeds the boost.</text>
<rect x="342" y="156" width="318" height="84" rx="9" fill="#ffffff" stroke="#e2e0d8" stroke-width="1"/>
<rect x="342" y="170" width="4" height="56" rx="2" fill="#BA7517"/>
<g><rect x="360" y="188" width="32" height="20" rx="2" fill="#633806"/><rect x="364" y="192" width="24" height="4" rx="1" fill="#BA7517"/><circle cx="368" cy="203" r="2" fill="#FAC775"/><circle cx="376" cy="203" r="2" fill="#FAC775"/><circle cx="384" cy="203" r="2" fill="#FAC775"/></g>
