<text x="424" y="476" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">PCB</text>
<text x="448" y="477" font-size="13.5" font-weight="600" fill="#1a1a1a">ElectroCookie + passives</text>
<text x="408" y="500" font-size="11.5" fill="#555">Holds R1, LED D1, C1 bulk +</text>
<text x="408" y="516" font-size="11.5" fill="#555">C2-C5 caps, headers, terminals.</text>
