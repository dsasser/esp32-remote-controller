<text x="433" y="183" font-size="13.5" font-weight="600" fill="#1a1a1a">2S Li-ion BMS</text>
<text x="408" y="206" font-size="11.5" fill="#555">10A+ protection: over-current,</text>
<text x="408" y="222" font-size="11.5" fill="#555">over-discharge, cell balance.</text>
<rect x="12" y="254" width="318" height="84" rx="9" fill="#ffffff" stroke="#e2e0d8" stroke-width="1"/>
<rect x="12" y="268" width="4" height="56" rx="2" fill="#BA7517"/>
