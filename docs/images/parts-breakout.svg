<rect x="408" y="366" width="46" height="17" rx="8" fill="#E1F5EE"/>
<text x="431" y="378" text-anchor="middle" font-size="11" font-weight="600" fill="#04342C">D2-D5</text>
<text x="462" y="379" font-size="13.5" font-weight="600" fill="#1a1a1a">P6KE15A TVS diodes</text>
<text x="408" y="402" font-size="11.5" fill="#555">One per channel across the output.</text>
<text x="408" y="418" font-size="11.5" fill="#555">Cathode to + post; clamps spikes.</text>
