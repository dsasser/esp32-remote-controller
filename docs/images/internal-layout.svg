<svg xmlns="http://www.w3.org/2000/svg" width="680" height="545" viewBox="0 0 680 545" font-family="sans-serif" role="img">
<title>Internal layout — top-down view of the enclosure</title>
<desc>Top-down floor plan of the Hammond 1455N1601 enclosure showing PCB, relay module, 2S battery, BMS, the 6-wire ribbon between PCB and relay, the 7.4V power path through the inline fuse and master switch, outputs to the front binding posts, and rear-panel connectors.</desc>
<rect x="0" y="0" width="680" height="545" fill="#ffffff"/>

<!-- heading -->
<text x="340" y="24" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Inside the box — top-down floor plan</text>
<text x="340" y="40" text-anchor="middle" font-size="10" fill="#888">Hammond 1455N1601BK · 160 × 103 × 53 mm interior</text>

<!-- orientation -->
<text x="195" y="56" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a1a1a">◂ FRONT — igniter binding posts</text>
<text x="500" y="56" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a1a1a">power · charge · USB — REAR ▸</text>

<!-- enclosure floor -->
<rect x="70" y="62" width="544" height="346" rx="8" fill="#ffffff" stroke="#333" stroke-width="2.5"/>

<!-- ===================== WIRES (under boxes) ===================== -->
<!-- 7.4V raw: BMS -> fuse -> SW1 -->
<polyline points="473,300 473,244 590,244 590,142" fill="none" stroke="#c2410c" stroke-width="2.5"/>
<!-- switched 7.4V: SW1 -> PCB (top corridor) -->
<polyline points="598,126 598,80 300,80 300,100" fill="none" stroke="#c2410c" stroke-width="2.5"/>
<text x="430" y="75" text-anchor="middle" font-size="8" fill="#c2410c">switched 7.4V → PCB</text>
<!-- output bus: PCB -> binding posts -->
<polyline points="120,200 102,200 102,116 102,354" fill="none" stroke="#993c1d" stroke-width="2.5"/>
<line x1="102" y1="116" x2="98" y2="116" stroke="#993c1d" stroke-width="2.5"/>
<line x1="102" y1="188" x2="98" y2="188" stroke="#993c1d" stroke-width="2.5"/>
<line x1="102" y1="282" x2="98" y2="282" stroke="#993c1d" stroke-width="2.5"/>
<line x1="102" y1="354" x2="98" y2="354" stroke="#993c1d" stroke-width="2.5"/>
<!-- charge jack -> BMS -->
<polyline points="598,237 548,237 548,300" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3"/>
<!-- USB-C -> ESP32 (bottom corridor) -->
<polyline points="598,360 598,398 130,398 130,220" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="300" y="394" text-anchor="middle" font-size="8" fill="#888">USB-C → ESP32 (flying lead)</text>
<!-- 6-wire ribbon: PCB <-> relay -->
<line x1="320" y1="150" x2="372" y2="150" stroke="#534ab7" stroke-width="2.5"/>
<line x1="320" y1="160" x2="372" y2="160" stroke="#534ab7" stroke-width="2.5"/>
<text x="346" y="142" text-anchor="middle" font-size="8" font-weight="600" fill="#534ab7">6-wire</text>

<!-- ===================== COMPONENT BLOCKS ===================== -->
<!-- PCB -->
<rect x="120" y="100" width="200" height="120" rx="5" fill="#eef3f8" stroke="#5b6b7a" stroke-width="1.3"/>
<text x="220" y="124" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">ElectroCookie PCB</text>
<text x="220" y="140" text-anchor="middle" font-size="9" fill="#666">ESP32-S3 · MP1584EN · TVS · terminals</text>
<text x="150" y="206" text-anchor="middle" font-size="8" fill="#8a96a3">OUTPUT</text>
<text x="220" y="206" text-anchor="middle" font-size="8" fill="#8a96a3">LOGIC</text>
<text x="290" y="206" text-anchor="middle" font-size="8" fill="#8a96a3">POWER IN</text>

<!-- Relay -->
<rect x="372" y="100" width="210" height="116" rx="5" fill="#fdf3e6" stroke="#b07d3a" stroke-width="1.3"/>
<text x="477" y="124" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">4-channel relay (K1)</text>
<text x="477" y="140" text-anchor="middle" font-size="9" fill="#666">VNFOCKQSH · off-board, M3 to floor</text>
<text x="477" y="196" text-anchor="middle" font-size="8" fill="#b07d3a">COM ← 7.4V   ·   NO → outputs</text>

<!-- Battery -->
<rect x="120" y="268" width="250" height="120" rx="5" fill="#e9f5f1" stroke="#3f8f78" stroke-width="1.3"/>
<text x="245" y="300" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">2S pack — 2× 18650</text>
<text x="245" y="318" text-anchor="middle" font-size="9" fill="#666">Samsung 30Q · hook-and-loop strap</text>
<circle cx="180" cy="350" r="20" fill="#ffffff" stroke="#3f8f78" stroke-width="1"/>
<circle cx="225" cy="350" r="20" fill="#ffffff" stroke="#3f8f78" stroke-width="1"/>

<!-- BMS -->
<rect x="398" y="300" width="150" height="78" rx="5" fill="#f4f4f2" stroke="#888" stroke-width="1.3"/>
<text x="473" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">2S BMS</text>
<text x="473" y="344" text-anchor="middle" font-size="9" fill="#666">10A protection</text>
<text x="473" y="362" text-anchor="middle" font-size="8" fill="#888">charges from J1</text>

<!-- inline fuse on the 7.4V wire -->
<rect x="526" y="237" width="28" height="14" rx="3" fill="#fff5f0" stroke="#c2410c" stroke-width="1.1"/>
<text x="540" y="247" text-anchor="middle" font-size="7" font-weight="600" fill="#c2410c">F1 5A</text>

<!-- ===================== FRONT PANEL POSTS ===================== -->
<circle cx="84" cy="90" r="4" fill="#6aa84f"/>
<text x="72" y="93" text-anchor="end" font-size="8" fill="#555">LED</text>
<g>
<circle cx="84" cy="116" r="5" fill="#c2410c"/><circle cx="98" cy="116" r="5" fill="#1b1b1a"/><text x="72" y="119" text-anchor="end" font-size="8" fill="#555">CH1</text>
<circle cx="84" cy="188" r="5" fill="#c2410c"/><circle cx="98" cy="188" r="5" fill="#1b1b1a"/><text x="72" y="191" text-anchor="end" font-size="8" fill="#555">CH2</text>
<circle cx="84" cy="282" r="5" fill="#c2410c"/><circle cx="98" cy="282" r="5" fill="#1b1b1a"/><text x="72" y="285" text-anchor="end" font-size="8" fill="#555">CH3</text>
<circle cx="84" cy="354" r="5" fill="#c2410c"/><circle cx="98" cy="354" r="5" fill="#1b1b1a"/><text x="72" y="357" text-anchor="end" font-size="8" fill="#555">CH4</text>
</g>

<!-- ===================== REAR PANEL CONNECTORS ===================== -->
<rect x="590" y="126" width="16" height="16" rx="3" fill="#fdeee6" stroke="#c2410c" stroke-width="1.3"/>
<text x="612" y="139" text-anchor="start" font-size="9" fill="#555">SW1 power</text>
<circle cx="598" cy="237" r="6" fill="#fafafa" stroke="#999" stroke-width="1.3"/>
<text x="612" y="241" text-anchor="start" font-size="9" fill="#555">J1 charge</text>
<rect x="590" y="350" width="16" height="12" rx="3" fill="#fafafa" stroke="#999" stroke-width="1.3"/>
<text x="612" y="360" text-anchor="start" font-size="9" fill="#555">J2 USB-C</text>

<!-- ===================== LEGEND ===================== -->
<text x="40" y="436" font-size="11.5" font-weight="600" fill="#1a1a1a">Connections &amp; wiring</text>
<line x1="44" y1="454" x2="74" y2="454" stroke="#c2410c" stroke-width="2.5"/>
<text x="82" y="457" font-size="9" fill="#555">7.4 V power: pack → BMS → F1 fuse → SW1 → PCB → relay COM</text>
<line x1="44" y1="473" x2="74" y2="471" stroke="#534ab7" stroke-width="2.5"/>
<line x1="44" y1="477" x2="74" y2="475" stroke="#534ab7" stroke-width="2.5"/>
<text x="82" y="476" font-size="9" fill="#555">6-wire ribbon: PCB ↔ relay (GND, 5 V, IN1–IN4)</text>
<line x1="44" y1="494" x2="74" y2="494" stroke="#993c1d" stroke-width="2.5"/>
<text x="82" y="497" font-size="9" fill="#555">outputs: relay NO → TVS (on PCB) → 4× ± binding posts</text>
<line x1="44" y1="513" x2="74" y2="513" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="82" y="516" font-size="9" fill="#555">flying leads: charge jack → BMS, USB-C → ESP32, status LED</text>
<text x="40" y="535" font-size="8" fill="#aaa">All parts sit in one layer (~18 mm tall); the 53 mm-deep box leaves ample lid clearance and ribbon slack to lift the PCB out.</text>
<!-- wire-gauge tags -->
<text x="470" y="234" font-size="8" fill="#c2410c">18 AWG</text>
<text x="346" y="174" text-anchor="middle" font-size="8" fill="#534ab7">18–20 AWG</text>
<text x="106" y="250" font-size="8" fill="#993c1d">18 AWG</text>
</svg>
