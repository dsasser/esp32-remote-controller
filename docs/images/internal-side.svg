<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430" font-family="sans-serif" role="img">
<title>Side view — component heights and lid clearance</title>
<desc>Side elevation of the enclosure interior showing the PCB-plus-ESP32 stack, the relay module, the 2S battery, and the BMS at their heights, the ~25 mm of headroom under the lid, and a wire-gauge table.</desc>
<rect x="0" y="0" width="680" height="430" fill="#ffffff"/>

<text x="340" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Side view — heights &amp; clearance</text>
<text x="340" y="38" text-anchor="middle" font-size="10" fill="#888">Looking along the box. Battery &amp; BMS sit beside the PCB &amp; relay (drawn see-through), so heights overlap, not stack.</text>

<!-- interior box -->
<rect x="80" y="92" width="528" height="148" fill="#ffffff" stroke="#333" stroke-width="2"/>
<text x="86" y="106" font-size="9" fill="#888">FRONT ▾ panel</text>
<text x="602" y="106" text-anchor="end" font-size="9" fill="#888">REAR ▾ panel</text>
<!-- floor -->
<line x1="80" y1="240" x2="608" y2="240" stroke="#333" stroke-width="3"/>

<!-- battery (behind, light) -->
<rect x="100" y="174" width="171" height="66" rx="20" fill="#e9f5f1" stroke="#9cc3b6" stroke-width="1.3"/>
<text x="185" y="216" text-anchor="middle" font-size="9" fill="#3f8f78">2S pack — 2×18650 (in holder)</text>
<text x="185" y="230" text-anchor="middle" font-size="8" fill="#9cc3b6">lying down · behind the PCB</text>

<!-- BMS (behind relay, low) -->
<rect x="394" y="227" width="132" height="13" fill="#f4f4f2" stroke="#999" stroke-width="1.2"/>
<text x="460" y="236" text-anchor="middle" font-size="8" fill="#888">BMS ~4 mm</text>

<!-- PCB + ESP stack (front) -->
<rect x="118" y="220" width="8" height="20" fill="#9aa6b2"/>
<rect x="244" y="220" width="8" height="20" fill="#9aa6b2"/>
<rect x="113" y="174" width="144" height="46" rx="3" fill="#eef3f8" stroke="#5b6b7a" stroke-width="1.4"/>
<rect x="150" y="160" width="70" height="16" rx="2" fill="#dfe7f0" stroke="#5b6b7a" stroke-width="1"/>
<text x="185" y="196" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a4753">PCB + ESP32</text>
<text x="185" y="208" text-anchor="middle" font-size="8" fill="#5b6b7a">standoffs + headers (socketed)</text>

<!-- relay (rear) -->
<rect x="380" y="227" width="8" height="13" fill="#caa06a"/>
<rect x="558" y="227" width="8" height="13" fill="#caa06a"/>
<rect x="372" y="181" width="205" height="46" rx="3" fill="#fdf3e6" stroke="#b07d3a" stroke-width="1.4"/>
<rect x="392" y="167" width="18" height="14" fill="#f3e0c4" stroke="#b07d3a" stroke-width="0.8"/>
<rect x="430" y="167" width="18" height="14" fill="#f3e0c4" stroke="#b07d3a" stroke-width="0.8"/>
<rect x="468" y="167" width="18" height="14" fill="#f3e0c4" stroke="#b07d3a" stroke-width="0.8"/>
<rect x="506" y="167" width="18" height="14" fill="#f3e0c4" stroke="#b07d3a" stroke-width="0.8"/>
<text x="474" y="208" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5e22">4-ch relay (off-board)</text>

<!-- height dimensions -->
<g stroke="#c2410c" stroke-width="1" fill="#c2410c">
<line x1="272" y1="160" x2="272" y2="240"/>
<line x1="268" y1="160" x2="276" y2="160"/><line x1="268" y1="240" x2="276" y2="240"/>
</g>
<text x="280" y="200" font-size="8.5" fill="#c2410c">~20 mm</text>
<g stroke="#b07d3a" stroke-width="1" fill="#b07d3a">
<line x1="362" y1="167" x2="362" y2="240"/>
<line x1="358" y1="167" x2="366" y2="167"/><line x1="358" y1="240" x2="366" y2="240"/>
</g>
<text x="356" y="205" text-anchor="end" font-size="8.5" fill="#b07d3a">~18 mm</text>

<!-- clearance -->
<g stroke="#0f6e56" stroke-width="1" fill="#0f6e56">
<line x1="330" y1="92" x2="330" y2="160"/>
<line x1="326" y1="92" x2="334" y2="92"/><line x1="326" y1="160" x2="334" y2="160"/>
</g>
<text x="338" y="128" font-size="9" font-weight="600" fill="#0f6e56">~25 mm headroom</text>

<!-- usable height -->
<g stroke="#888" stroke-width="1" fill="#888">
<line x1="628" y1="92" x2="628" y2="240"/>
<line x1="624" y1="92" x2="632" y2="92"/><line x1="624" y1="240" x2="632" y2="240"/>
</g>
<text x="636" y="150" font-size="8.5" fill="#888">45 mm</text>
<text x="636" y="162" font-size="8.5" fill="#888">usable</text>
<text x="636" y="174" font-size="7.5" fill="#aaa">(53 ext.)</text>

<!-- front posts / rear connectors stubs -->
<circle cx="74" cy="150" r="3" fill="#c2410c"/><circle cx="74" cy="162" r="3" fill="#1b1b1a"/>
<circle cx="74" cy="200" r="3" fill="#c2410c"/><circle cx="74" cy="212" r="3" fill="#1b1b1a"/>
<rect x="611" y="150" width="10" height="9" rx="2" fill="#fdeee6" stroke="#c2410c" stroke-width="1"/>
<circle cx="616" cy="200" r="4" fill="#fafafa" stroke="#999" stroke-width="1"/>

<!-- ===================== WIRE GAUGES ===================== -->
<text x="40" y="288" font-size="12.5" font-weight="600" fill="#1a1a1a">Wire gauges</text>
<line x1="44" y1="306" x2="80" y2="306" stroke="#c2410c" stroke-width="4"/>
<text x="88" y="309" font-size="9.5" fill="#1a1a1a">18 AWG</text>
<text x="150" y="309" font-size="9.5" fill="#555">7.4 V firing path: battery → fuse → SW1 → relay COM, and relay NO → binding posts (carries the amps).</text>
<line x1="44" y1="328" x2="80" y2="328" stroke="#534ab7" stroke-width="3.2"/>
<text x="88" y="331" font-size="9.5" fill="#1a1a1a">18–20 AWG</text>
<text x="170" y="331" font-size="9.5" fill="#555">6-wire ribbon to relay (GND, 5 V, IN1–IN4): logic + signal, &lt;0.4 A — your 18–20 AWG is fine, just bulky.</text>
<line x1="44" y1="350" x2="80" y2="350" stroke="#888" stroke-width="2"/>
<text x="88" y="353" font-size="9.5" fill="#1a1a1a">22–26 AWG</text>
<text x="170" y="353" font-size="9.5" fill="#555">5 V / GPIO logic on the PCB and the status-LED flying lead (tiny currents).</text>
<text x="40" y="378" font-size="8.5" fill="#aaa">Twist the 7.4 V pair and keep firing runs short. Leave ribbon slack so the PCB lifts out without unplugging the relay.</text>
</svg>
